name: Daily Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate latest deals
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/collect_deals.py

      - name: Generate report
        run: node scripts/generate-report.mjs

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deals.json reports/daily-deals.md
          git diff --cached --quiet && exit 0
          git commit -m "Daily deal refresh"
          git push
